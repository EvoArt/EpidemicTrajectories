name: Docs

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'src/**'
      - 'Project.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - 'Project.toml'
      - '.github/workflows/docs.yml'

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      # PracticalBayes is not registered, so the docs environment develops it
      # from its GitHub repository (the tutorial fits a model with it). This
      # package itself is developed from the checkout.
      - name: Install docs environment
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.add(PackageSpec(url="https://github.com/EvoArt/PracticalBayes.git"))
            Pkg.instantiate()'

      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs docs/make.jl
